app = "gaud-paperclip"
primary_region = "gru"
swap_size_mb = 512

[build]

[env]
  NODE_ENV = "production"
  PORT = "3100"
  NODE_OPTIONS = "--max-old-space-size=512"
  HEARTBEAT_SCHEDULER_INTERVAL_MS = "86400000"
  PAPERCLIP_AUTH_DISABLE_SIGN_UP = "true"

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "paperclip_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2048mb"
