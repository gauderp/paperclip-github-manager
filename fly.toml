app = "gaud-paperclip"
primary_region = "gru"
swap_size_mb = 512

[build]

[env]
  NODE_ENV = "production"
  PORT = "3100"
  NODE_OPTIONS = "--max-old-space-size=768"

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1024mb"
